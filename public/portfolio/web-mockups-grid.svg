<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Portfolio web mockups grid">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b0b"/>
      <stop offset="100%" stop-color="#1f1f1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b05000"/>
      <stop offset="100%" stop-color="#c05000"/>
    </linearGradient>
    <style>
      .card { fill: #121212; stroke: rgba(255,255,255,0.12); }
      .bar { fill: url(#accent); }
      .title { fill: #f5f5f5; font: 600 24px 'Segoe UI', Arial, sans-serif; }
      .line { fill: #bdbdbd; }
    </style>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <g transform="translate(40,40)">
