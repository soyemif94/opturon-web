    <g transform="translate(380,290)"><rect class="card" width="360" height="250" rx="18"/><rect class="bar" x="24" y="24" width="170" height="18" rx="9"/><rect class="line" x="24" y="70" width="300" height="10" rx="5"/><rect class="line" x="24" y="90" width="260" height="10" rx="5"/><text class="title" x="24" y="220">Model 5</text></g>
